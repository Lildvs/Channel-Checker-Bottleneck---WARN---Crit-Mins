version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"   # FastAPI
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-changeme}:${DB_PASSWORD:-changeme}@timescaledb:5432/${DB_NAME:-changeme}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./frontend:/app/frontend
      - ./scripts:/app/scripts
      - ./data:/app/data
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-changeme}:${DB_PASSWORD:-changeme}@timescaledb:5432/${DB_NAME:-changeme}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: python -m src.data_ingestion.scheduler
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-changeme}
      POSTGRES_USER: ${DB_USER:-changeme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-changeme} -d ${DB_NAME:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: changeme-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'  # Enable hot-reload of config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  timescale_data:
  redis_data:
  prometheus_data:

networks:
  default:
    name: changeme-network
